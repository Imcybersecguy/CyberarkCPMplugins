#States names can contain only alphabet and numeric characters
[states]
#Initialization
Init=(script)set bTarget 0; set verifyLogon 0; set curr_pass "<pmpass>";
InitCiscoEnable=(script)set enable_pass "<pmpass>";
InitCiscoUser=(script)set enable_pass "<pmextrapass1>";
InitCiscoTerminal=(script)set enable_pass "<pmextrapass1>";

CheckLoginVars
InitLoginFromLoginObj=(script)set bTarget 0; set login_pass "<pmextrapass2>"; set login_user "<extrapass2\username>"; set login_address "<extrapass2\address>"; set login_port "<extrapass2\port>";
InitLoginFromOrigObj=(script)set bTarget 1; set login_pass "<pmpass>"; set login_user "<username>"; set login_address "<address>"; set login_port "<port>";

#Login sequence
CheckProtocol
StartSessionSSH=(spawn)bin\\plink.exe $login_address -ssh -P $login_port
StartSessionTelnet=(spawn)telnet $login_address $login_port
StoreKeyInCache=y

LoginUser=$login_user
LoginPass=$login_pass

#Check logon or changepass action
CheckAction1
			 	
#Switch to enable mode
SwitchToEnableMode=enable
SendEnablePassword=$enable_pass

#initiate change password process
ConfigureTerminal=configure terminal
CheckUserType
#Change user password
ChangeUserPass=username <username> password <pmnewpass>
#Change terminal password
ChangeTerminalPass1=line vty <vty>
ChangeTerminalPass2=password <pmnewpass>
#Change enable password
ChangeEnablePass=enable secret <pmnewpass>

#Logout
logout=(script)close

#Copy NVRAM
ExitConfigMode=exit
CheckIfCommitSpecified
StartCommit=(startsync)tmp/tpcengine-cisco-$login_address
commit=copy running-config startup-config
EndCommit=(endsync)tmp/tpcengine-cisco-$login_address
CheckCommit=startup-config

#Verify logon
InitVerifyLogon
InitVerifyLogonLoginObj=(script)set bTarget 0; set verifyLogon 1; set curr_pass "<pmnewpass>"; 
InitVerifyLogonLoginObjWithEnable=(script)set bTarget 1; set verifyLogon 1; set curr_pass "<pmnewpass>"; set enable_pass "<pmnewpass>";
InitVerifyLogonOrigObj=(script)set bTarget 1; set verifyLogon 1; set curr_pass "<pmnewpass>"; set login_pass "<pmnewpass>";
#-----------------------------------------
# Parm for Verification & Reconcilliation
#-----------------------------------------
InitAction=(script)set bTarget 0; set bVerifyRecPass 0; set bTacacsAuth 0; set bPreviousPasswordHashSet 0;
CheckAction
CheckUsernameForBlackList=(script) set bContainsBlacklistCharsOrWords [expr {![string is alnum "<username>"]||[string match -nocase "password" "<username>"]}];

Verify
Reconcile
SetRecPass
SetRecPassExt3=(script)set bTarget 0;set enable_pass "<pmextrapass1>";set login_pass "<pmextrapass3>"; set login_user "<extrapass3\username>"; set login_address "<extrapass3\address>"; set login_port "<extrapass3\port>";
SetRecPassExt2=(script)set bTarget 0;set enable_pass "<pmextrapass1>";set login_pass "<pmextrapass2>"; set login_user "<extrapass2\username>"; set login_address "<extrapass2\address>"; set login_port "<extrapass2\port>";
CheckRecByEnableExt2
CheckRecByEnableExt3
# Logon with orig
InitVerifyCiscoUser=(script)set bTarget 1;set enable_pass "<pmextrapass1>";set login_pass "<pmpass>"; set login_user "<username>"; set login_address "<address>"; set login_port "<port>";
# Logon with orig
InitVerifyCiscoTerminal=(script)set bTarget 1;set enable_pass "<pmextrapass1>";set login_pass "<pmpass>"; set login_user "<username>"; set login_address "<address>"; set login_port "<port>";
#Logon with logon pass
InitVerifyCiscoEnable=(script)set bTarget 0;set enable_pass "<pmpass>";set login_pass "<pmextrapass2>"; set login_user "<extrapass2\username>"; set login_address "<extrapass2\address>"; set login_port "<extrapass2\port>"; 
HowToVerifyLogon
VerifyAfterRec
InitVerifyAfterRecCiscoUser=(script)set bVerifyRecPass 1;set bTarget 1;set enable_pass "<pmextrapass1>";set login_pass "<pmnewpass>"; set login_user "<username>"; set login_address "<address>"; set login_port "<port>";
InitVerifyAfterRecCiscoTerminal=(script)set bVerifyRecPass 1;set bTarget 1;set enable_pass "<pmextrapass1>";set login_pass "<pmnewpass>"; set login_user "<username>"; set login_address "<address>"; set login_port "<port>";
InitVerifyAfterRecCiscoEnable=(script)set bVerifyRecPass 1;set bTarget 0;set enable_pass "<pmnewpass>";set login_pass "<pmextrapass2>"; set login_user "<extrapass2\username>"; set login_address "<extrapass2\address>"; set login_port "<extrapass2\port>";

#Set parms for GetUserPrompt function
GetUserPrompt
GUPCheckProtocol
GUPStartSessionSSH=(spawn)bin\\plink.exe $login_address -ssh -P $login_port
GUPStartSessionTelnet=(spawn)telnet $login_address $login_port
GUPStoreKeyInCache=y
GUPLoginUser=$login_user
GUPLoginPass=$login_pass
GUPCheckAction
VerifyEnableUserMode
VerifyEnableUserModeAfterRec
ReconcileUserMode
CheckRecPrompt
CheckRecAccountType
CheckIfPreRecAction
CheckVerifyEnablePrompt
GetLimitedPrompt=disable
CheckInvalidLogin
SetEnablePromptFlag=(script)set bEnablePrompt 1;
SetStandardPromptFlag=(script)set bEnablePrompt 0;
SetStandardPromptFlag2=(script)set bEnablePrompt 0;


#Set parms for GetPrivMode function
GetPrivMode
GPMCheckPrivPrompt
GPMGetEnablePrompt=enable
GPMCheckActionBeforeSetTarget
GPMSetTargetToVerifyEnablePass=(script)set bTarget 1;
GPMSetTargetToVerifyEnableAfterRec=(script)set bTarget 1;
GPMCheckEnableRecAccountSource
GPMCheckAction
GPMSendEnablePassword=$enable_pass
ReconcilePrivMode
DirectToChangePass
SetAccountToBeReconciled=(script)set login_pass "<pmpass>"; set login_user "<username>"; set login_address "<address>"; set login_port "<port>";
GPMSetRecAccountEnableFromExt3=(script)set bTarget 0; set enable_pass "<pmextrapass3\pmextrapass1>";set login_pass "<pmpass>"; set login_user "<username>"; set login_address "<address>"; set login_port "<port>";
GPMSetRecAccountEnableFromExt2=(script)set bTarget 0; set enable_pass "<pmextrapass2\pmextrapass1>";set login_pass "<pmpass>"; set login_user "<username>"; set login_address "<address>"; set login_port "<port>";
SetTacacsReconciliationVerificationOn

#New states in pre-change phase (to support verification&reconciliation)
CheckStandardPromptAction
CheckAccountType
SetTargetEnablePreChange=(script)set bTarget 1;
UnsetTargetEnablePreChange=(script)set bTarget 0;

#Base version of TACACS
SetTacacsAuthOn=(script)set bTacacsAuth 1;

CheckTacacsAuthParameter

CheckTacacsAuthVerify
CheckTacacsAuthLogonOrChange
CheckTacacsAuthReconcile
CheckTacacsAuthVerifyAfterReconcile

TACCheckAction

VerifyAfterRecPassHash

#Show users on Cisco
GPHVerifyAfterRec
GPHInitVerifyAfterRecCiscoUser=(script)set bVerifyRecPass 1;set bTarget 0;set enable_pass "<pmextrapass3\pmextrapass1>";set login_pass "<pmextrapass3>"; set login_user "<extrapass3\username>"; set login_address "<extrapass3\address>"; set login_port "<extrapass3\port>";
GPHInitVerifyAfterRecCiscoTerminal=(script)set bVerifyRecPass 1;set bTarget 0;set enable_pass "<pmextrapass2\pmextrapass1>";set login_pass "<pmextrapass2>"; set login_user "<extrapass2\username>"; set login_address "<extrapass2\address>"; set login_port "<extrapass2\port>";
GPHInitVerifyAfterRecCiscoEnable=(script)set bVerifyRecPass 1;set bTarget 0;set enable_pass "<pmnewpass>";set login_pass "<pmextrapass2>"; set login_user "<extrapass2\username>"; set login_address "<extrapass2\address>"; set login_port "<extrapass2\port>";

GPHGetUserPrompt
GPHGetEnablePrompt=enable

GPHCheckPassword=(script)set bEnablePrompt 1;
GPHSetPreviousPasswordHash=(script)set bPreviousPasswordHashSet 1;
GPHSetHashPrev=(setLastPromptToParameter)set bPreviousPasswordHash
GPHShowPreviousUserExistence=show running-config | include username <username>
GPHSetNewPasswordHash
GPHSetHashNev=(setLastPromptToParameter)set bNewPasswordHash
GPHShowNewUserExistence=show running-config | include username <username>

GPHCheckProtocol
GPHStartSessionSSH=(spawn)bin\\plink.exe $login_address -ssh -P $login_port
GPHStartSessionTelnet=(spawn)telnet $login_address $login_port
GPHStoreKeyInCache=y
GPHLoginUser=$login_user
GPHLoginPass=$login_pass

GPHCheckActionBeforeSetTarget      
GPHCheckEnableRecAccountSource
GPHSetRecAccountEnableFromExt3=(script)set bTarget 0;set enable_pass "<pmextrapass3\pmextrapass1>";set login_pass "<pmextrapass3>"; set login_user "<extrapass3\username>"; set login_address "<extrapass3\address>"; set login_port "<extrapass3\port>";
GPHSetRecAccountEnableFromExt2=(script)set bTarget 0;set enable_pass "<pmextrapass2\pmextrapass1>";set login_pass "<pmextrapass2>"; set login_user "<extrapass2\username>"; set login_address "<extrapass2\address>"; set login_port "<extrapass2\port>";

#Increse terminal width for longer commands
GPHIncreaseTerminalWidth=terminal width 0

#Switch to enable mode
GPHSendEnablePassword=$enable_pass

#Logout
GPHlogout=(script)close
GPHGoToReconcile

#Final state
END

#Failure states
FailUnableToConnect=FAIL(First login - Unable to connect to the machine. Check machine address and port, 8000)
#Reconcile error - 2114
FailInvalidCurrPassword1=FAIL(First login - Bad username or password while logging onto the machine, 2114) 
FAILInvalidNewPassword=FAIL(Invalid new password while sending new password, 8004)
FailEnableRequired=FAIL(First login - Enable password required but not specified, 8011)
FailInvalidVTY=FAIL(Failed to change password for terminal - invalid vty, 8012)
GUPFailUnableToConnect=FAIL(GetUserPrompt - Unable to connect to machine. Check machine address and port, 8013)
FailLinkedPassword=FAIL(CheckInvalidLogin - Invalid linked password, 8014)
FAILToGetLimitedPrompt=FAIL(Failed to get limited prompt - Disable command failed, 8015)
FAILRecEnableWithLimitetUser=FAIL(Reconciliation for enable account can not be performed with limited account, 8016)
FAILEnableLinkedPass=FAIL(A limited reconcile password must be associated with an enable password account, 8017)
FAILRecByEnable=FAIL(Reconciliation by an enable account is an unsupported operation, 8018)
FAILParamerterContainsForbiddenCharsOrWords=FAIL(Invalid Username - Username must contain only alphanumeric characters, 8019)

#Tacacs Errors
TACVerifyFail=FAIL(Verify action failed - Make sure you use TACACS account. Local Cisco accounts cannot be verified when TACACS Authentication is ON, 8020)
TACChangeFail=FAIL(Change action failed - Passwords cannot be changed via Cisco platform when TACACAS Authentication is ON. Please use TACACS platform, 8022)
TACReconcileFail=FAIL(Reconcile action failed - Make sure you use TACACS account. Local Cisco accounts cannot be used for reconcile when TACACS Authentication is ON, 8023)
TACReconcileSamePasswordFail=FAIL(Reconcile action failed - Local Cisco account has same password as previous one. Do not use nonencrypted passwords, 8024)
GPHFailUnableToConnect=FAIL(GetPasswordHash - Unable to connect to machine. Check machine address and port, 8025)


